services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - CORS_ORIGINS=*
      - DATABASE_URL=${DATABASE_URL:-sqlite:///chikguard.db}
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
    devices:
      # Passthrough of the camera for Edge execution
      - "/dev/video0:/dev/video0"
    # To use hardware acceleration, might need specific privileges
    privileged: true
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    restart: always
