version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chikguard_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - ENV=production
      - ADMIN_PASSWORD=admin123
    volumes:
      - ./backend:/app
      - /dev/video0:/dev/video0
    privileged: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chikguard_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared
    container_name: chikguard_tunnel
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
